      <g transform="translate(820 360)">
        <rect x="0" y="0" width="320" height="170" rx="16" fill="#fff7ed" stroke="#fdba74" />
        <text x="20" y="30" font-size="18" fill="#9a3412" font-weight="700">Validação</text>
        <text x="20" y="58" font-size="13" fill="#7c2d12">Aviso: Feature fora do escopo da V1: Hexagono interno 1,2. Vista frontal indica hexagono 1,2 com tolerancias +0,025/+0,010; profundidade nao legivel.</text><text x="20" y="78" font-size="13" fill="#7c2d12">Aviso: Feature fora do escopo da V1: Broca Ø1,2 com profundidade indefinida. Croqui pergunta &apos;prof. broca?&apos;. Deve bloquear liberacao de fabricacao.</text>
      </g>
    
      
      <g transform="translate(820 550)">
        <rect x="0" y="0" width="320" height="116" rx="16" fill="#fefce8" stroke="#fde047" />
        <text x="20" y="30" font-size="18" fill="#854d0e" font-weight="700">Features fora do escopo</text>
        <text x="20" y="58" font-size="13" fill="#854d0e">Hexagono interno 1,2: Vista frontal indica hexagono 1,2 com tolerancias +0,025/+0,010; profundidade nao legivel.</text><text x="20" y="78" font-size="13" fill="#854d0e">Broca Ø1,2 com profundidade indefinida: Croqui pergunta &apos;prof. broca?&apos;. Deve bloquear liberacao de fabricacao.</text>
      </g>
    
      
      <g transform="translate(120 680)">
        <text x="0" y="0" font-size="16" fill="#0f172a" font-weight="700">Notas</text>
        <text x="0" y="24" font-size="13" fill="#334155">• Preliminar extraido do croqui 116.037.</text><text x="0" y="42" font-size="13" fill="#334155">• Hexagono 1,2 e broca 1,2 aparecem no croqui, mas a profundidade da broca esta marcada como pergunta.</text><text x="0" y="60" font-size="13" fill="#334155">• Nao liberar STEP sem Ronaldo confirmar profundidade do furo/hexagono.</text><text x="0" y="78" font-size="13" fill="#334155">• Trecho 1: Croqui tambem indica hexagono/furo interno; profundidade nao definida.</text>
      </g>
    
