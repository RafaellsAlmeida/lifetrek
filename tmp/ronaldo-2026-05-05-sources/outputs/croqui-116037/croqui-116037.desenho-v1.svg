        <text x="20" y="84" font-size="13" fill="#334155">Líder laranja: diâmetros e rosca</text>
        <text x="20" y="104" font-size="13" fill="#334155">Linhas cinza tracejadas: limites de trecho</text>
        <text x="20" y="124" font-size="13" fill="#334155">Perfis não suportados são sinalizados, nunca inventados.</text>
