<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cylinder Pointed Bur 12s MCXL nova - 3D</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #f8fafc;
        font-family: Arial, Helvetica, sans-serif;
      }
      #app {
        width: 100vw;
        height: 100vh;
      }
      .label {
        position: fixed;
        left: 24px;
        top: 20px;
        color: #0f172a;
        line-height: 1.35;
      }
      .label h1 {
        margin: 0 0 6px;
        font-size: 20px;
      }
      .label p {
        margin: 0;
        font-size: 13px;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div class="label">
      <h1>Cylinder Pointed Bur 12s MCXL nova</h1>
      <p>Modelo 3D preliminar. Diamantado, rosca e facetado simplificados.</p>
    </div>
    <script type="importmap">
      {
        "imports": {
          "three": "/node_modules/three/build/three.module.js"
        }
      }
    </script>
    <script type="module">
      import * as THREE from "/node_modules/three/build/three.module.js";
      import { OrbitControls } from "/node_modules/three/examples/jsm/controls/OrbitControls.js";
      import { GLTFLoader } from "/node_modules/three/examples/jsm/loaders/GLTFLoader.js";

      const app = document.getElementById("app");
      const scene = new THREE.Scene();
      scene.background = new THREE.Color("#f8fafc");

      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(36, 18, 28);

      const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      app.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 0, 0);

      scene.add(new THREE.HemisphereLight("#ffffff", "#94a3b8", 2.2));
      const key = new THREE.DirectionalLight("#ffffff", 2.5);
      key.position.set(20, 30, 15);
      scene.add(key);

      const grid = new THREE.GridHelper(48, 24, "#cbd5e1", "#e2e8f0");
      grid.rotation.z = Math.PI / 2;
      scene.add(grid);

      const loader = new GLTFLoader();
      loader.load("./cylinder-pointed-bur-12s-mcxl.glb", (gltf) => {
        const model = gltf.scene;
        model.traverse((child) => {
          if (child.isMesh) {
            child.material = new THREE.MeshStandardMaterial({
              color: "#64748b",
              metalness: 0.45,
              roughness: 0.28,
            });
          }
        });
        scene.add(model);
      });

      function animate() {
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      animate();

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
