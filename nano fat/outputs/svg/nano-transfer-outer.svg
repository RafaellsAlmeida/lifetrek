        <text x="0" y="24" font-size="13" fill="#334155">• Axisymmetric STEP approximation.</text><text x="0" y="42" font-size="13" fill="#334155">• Texture/thread/luer details simplified; see report.</text><text x="0" y="60" font-size="13" fill="#334155">• 1. Central through passage from section B/B: Ø2,40 mm x 39,50 mm (esquerda) • 2. Approximate luer lock envelope: Ø7,80 mm x 13,70 mm (esquerda) • 3. Right outlet counterbore: Ø4 mm x 13,90 mm (direita)</text><text x="0" y="78" font-size="13" fill="#334155">• Trecho 1: Recartilha reta passo 0.8 mm; exported as smooth cylinder.</text><text x="0" y="96" font-size="13" fill="#334155">• Trecho 4: Thread exported as nominal cylindrical/thread zone.</text><text x="0" y="114" font-size="13" fill="#334155">• Trecho 6: Drawing callout appears as 1.00 mm; modeled as 1.40 mm to reconcile the 39.50 mm total length.</text>
