<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slide 4 - Compliance</title>
  <style>
    html, body {
      margin: 0;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      font-family: Inter, Arial, sans-serif;
      background: #0b2f52;
    }
    .canvas {
      position: relative;
      width: 1080px;
      height: 1080px;
      background-image: url('./slide_4_base.png');
      background-size: cover;
      background-position: center;
    }
    .compliance {
      position: absolute;
      left: 56px;
      right: 56px;
      bottom: 46px;
      background: rgba(5, 21, 36, 0.78);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      color: #e8f0f8;
      font-size: 19px;
      line-height: 1.35;
      padding: 16px 18px;
      letter-spacing: 0.1px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.25);
    }
    .compliance strong {
      color: #ffffff;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="compliance">
      <strong>Aplicável a fabricantes com etapa fabril no Brasil.</strong>
      Não se aplica a distribuidores/importadores com apenas escritório comercial.
    </div>
  </div>
</body>
</html>
