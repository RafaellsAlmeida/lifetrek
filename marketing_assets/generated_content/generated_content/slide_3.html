      position: absolute;
      top: 42px;
      right: 46px;
      z-index: 3;
    }

      width: 186px;
      height: auto;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 4px 16px rgba(2, 8, 22, 0.45));
      margin-left: auto;

      font-weight: 700;
      letter-spacing: 0.02em;
      color: #ffffff;
      display: block;
      text-align: right;
    }

    .content-wrap {
      position: absolute;
      top: 152px;
      left: 46px;
      right: 46px;
      bottom: 52px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 38px;
    }

      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 940px;
    }

      margin: 0;
      font-size: 92px;
      font-weight: 300;
      line-height: 1.02;
      letter-spacing: -0.015em;
      text-transform: uppercase;
      color: var(--headline-light);
      max-width: 920px;
      text-wrap: balance;
      text-shadow: 0 8px 28px rgba(2, 12, 24, 0.46);
    }

    h1 strong {
      font-weight: 800;
      color: #ffffff;
      text-shadow: 0 10px 28px rgba(2, 12, 24, 0.55);
    }

    .body-panel {
      background: linear-gradient(145deg, rgba(1, 19, 38, 0.74) 0%, rgba(1, 17, 34, 0.64) 100%);
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 20px;
      padding: 34px 34px 30px;
      box-shadow: 0 24px 52px rgba(0, 7, 19, 0.42);
      backdrop-filter: blur(9px);
      -webkit-backdrop-filter: blur(9px);
    }

    .body-copy {
      margin: 0;
      font-size: 43px;
      font-weight: 500;
      line-height: 1.33;
      color: var(--headline-muted);
      text-shadow: 0 6px 20px rgba(2, 12, 24, 0.28);
    }

    .variant-cover h1 {
      font-size: 98px;
    }

    .variant-content h1 {
      font-size: 90px;
    }

    .variant-cta h1 {
      font-size: 88px;
    }

    .variant-cta .body-panel {
      border-color: rgba(240, 120, 24, 0.45);
    }
