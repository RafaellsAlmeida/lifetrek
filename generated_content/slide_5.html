      font-weight: 300;
      line-height: 1.02;

      text-wrap: balance;

      color: #ffffff;

      margin: 0;
      font-size: 43px;
      font-weight: 500;
      line-height: 1.33;
      color: var(--headline-muted);
      text-shadow: 0 6px 20px rgba(2, 12, 24, 0.28);
    }

    .variant-cover h1 {
      font-size: 98px;
    }

    .variant-content h1 {
      font-size: 90px;
    }

    .variant-cta h1 {
      font-size: 88px;
    }

    .variant-cta .body-panel {
      border-color: rgba(240, 120, 24, 0.45);
    }
